name: Copilot Setup Steps

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # NOTE:
    # Avoid `container:` here. Copilot's internal bootstrap steps may run with /bin/sh
    # and use bash-specific options (e.g. pipefail), which can fail inside some containers.

    steps:
      # Checkout is needed so subsequent steps can read repo files (.nvmrc,
      # package.json, yarn.lock).  After this workflow completes, the Copilot
      # agent does its own independent clone into a separate workspace — that is
      # normal infrastructure behavior, not a duplicate of this step.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        # Copilot setup prepares the agent workspace, including tasks that may
        # need to repair package.json/yarn.lock drift. Keep this non-immutable so
        # the agent can start; immutable installs remain enforced by normal CI.
        run: yarn install --no-immutable
