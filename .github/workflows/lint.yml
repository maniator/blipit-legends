name: Lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - 'feat/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch enough history to compare against the base branch for the
          # empty-commit check below (PRs only).
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Lint
        run: yarn lint

      - name: Format check
        run: yarn format:check

      - name: Check E2E spec sizes
        run: node scripts/check-spec-sizes.mjs

      - name: Check for circular dependencies
        run: yarn check:circular-deps
        continue-on-error: true

      - name: Typecheck E2E tests
        run: yarn typecheck:e2e

      - name: Check for empty commits
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          FOUND=""
          for sha in $(git log "${BASE_SHA}..HEAD" --format="%H"); do
            if [ -z "$(git diff-tree --no-commit-id -r "$sha" 2>/dev/null)" ]; then
              msg=$(git log -1 --pretty=format:"%s" "$sha")
              FOUND="${FOUND}  ${sha:0:12} $msg\n"
            fi
          done
          if [ -n "$FOUND" ]; then
            echo "❌ Empty commits found (no file changes):" >&2
            printf "%b" "$FOUND" >&2
            exit 1
          fi
          echo "✓ No empty commits."
