name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - 'feat/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Typecheck source files
        run: yarn typecheck

      - name: Typecheck E2E tests
        run: yarn typecheck:e2e

      - name: Test
        run: yarn test:coverage
        env:
          # vmForks pool isolates each test file in its own V8 VM context, so
          # memory is freed between files.  On the 2-core ubuntu-latest runner
          # Vitest creates one fork worker; 4 GB gives that worker headroom for
          # the largest test files while fitting within the 7 GB runner budget
          # (1 worker × 4 GB + main ~512 MB ≈ 4.6 GB total).
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Build
        run: yarn build
