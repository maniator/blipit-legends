name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - 'feat/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Typecheck source files
        run: yarn typecheck

      - name: Typecheck E2E tests
        run: yarn typecheck:e2e

      - name: Test
        run: yarn test:coverage
        env:
          # Safety-net heap limit for the vmForks pool workers.  With vmForks,
          # each test file runs in an isolated V8 VM context that is torn down
          # after the file completes, so peak memory is bounded by the largest
          # single file (~300 MB).  4 GB leaves generous headroom while staying
          # within the 7 GB available on ubuntu-latest runners.
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Build
        run: yarn build
