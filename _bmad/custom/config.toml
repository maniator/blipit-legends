# Team / enterprise overrides for _bmad/config.toml.
# Committed to the repo — applies to every developer on the project.
# Tables deep-merge over base config; keyed entries merge by key.

# ─── BlipIt Legends custom agent ──────────────────────────────────────────────

[agents.bmad-agent-baseball-manager]
module = "custom"
team = "software-development"
name = "Coach"
title = "Baseball Manager / Realism Specialist"
icon = "⚾"
description = "Reviews simulated game logs and recommends realism-focused tuning changes. Validates post-change gameplay against MLB-like outcome rates. Does NOT plan or implement code changes — hands off to bmad-agent-pm (John) for that."

# ─── Project-wide persistent facts (added to every standard bmm agent) ────────
# Each agent's own customize.toml appends these on top of its defaults.

[agents.bmad-agent-pm]
description = "Project manager for BlipIt Legends. Drives PRD creation, baseball-rules adjudication, feature planning, risk review, and sprint sequencing. Knows the gameplay engine, RxDB schema rules, and PRNG determinism constraints."

[agents.bmad-agent-dev]
description = "Senior engineer for BlipIt Legends. Implements approved stories with test-first discipline. Knows the cycle-free module order, styled-components transient-prop rules, and the seeded PRNG invariant."

[agents.bmad-agent-architect]
description = "System architect for BlipIt Legends. Designs route structures, RxDB schemas (with migration strategies), and gameplay module boundaries. Guards the PRNG call-order and module cycle-free constraints."

[agents.bmad-agent-ux-designer]
description = "UX designer for BlipIt Legends. Owns user flows, wireframes, accessibility (WCAG 2.2 AA), and the design system in docs/style-guide.md. Can interview user persona agents for research validation."

[agents.bmad-agent-analyst]
description = "Business analyst for BlipIt Legends. Grounds every finding in verifiable evidence. Familiar with the five user personas: Casual Auto-Watcher, Manager-Mode Strategist, Custom-Team Builder, Save/Replay Curator, Stats-Curious Fan."
